name: Daily DJ Sets Refresh

on:
  schedule:
    - cron: "15 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh DJ sets
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          if [ -z "$YOUTUBE_API_KEY" ]; then
            echo "YOUTUBE_API_KEY secret is required"
            exit 1
          fi
          python3 backend/scrape.py --max-age-days 60

      - name: Commit updated DJ sets
        run: |
          if git diff --quiet -- backend/data/dj_sets.json; then
            echo "No DJ set updates to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data/dj_sets.json
          git commit -m "chore: refresh daily DJ sets feed"
          git push
